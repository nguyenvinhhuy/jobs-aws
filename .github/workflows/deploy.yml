name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: ./job-service
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/jobs-backend:latest

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./fe-vue
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/jobs-frontend:latest

    - name: Copy docker-compose file to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "docker-compose.production.yml"
        target: "/home/ubuntu/jobs-aws"

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          mkdir -p /home/ubuntu/jobs-aws
          cd /home/ubuntu/jobs-aws

          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

          {
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}"
            echo "APP_CORS_ALLOWED_ORIGINS=http://${{ secrets.EC2_HOST }}"
          } > .env

          docker compose -f docker-compose.production.yml pull
          docker compose -f docker-compose.production.yml up -d --remove-orphans

          docker image prune -f
