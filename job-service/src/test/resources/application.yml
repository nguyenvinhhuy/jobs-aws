spring:
  datasource:
    url: jdbc:h2:mem:jobsdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      # Let Hibernate create/drop schema from JPA entities — avoids SQL init compatibility issues
      ddl-auto: create-drop
    open-in-view: false
  sql:
    init:
      # Disable Spring SQL init for tests; Hibernate manages the schema
      mode: never
  mail:
    host: localhost
    port: 1025

app:
  mail:
    enabled: false
